---
name: 🧪 CI - Check
on:
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - release
permissions: {}
jobs:
  check:
    name: 🧪 Check (Node ${{ matrix.NODE_VERSION }})
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'from cyberskill-world/release') == false
    strategy:
      fail-fast: false
      matrix:
        NODE_VERSION: [24.14.0]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Env & Deps
        uses: cyberskill-world/.github/actions/env-deps@main
        with:
          NODE_VERSION: ${{ matrix.NODE_VERSION }}

      - name: Security Audit
        run: pnpm audit --audit-level=high

      - name: Lint
        uses: cyberskill-world/.github/actions/lint@main

      - name: Build
        run: pnpm build

      - name: Validate Exports
        run: npx tsx scripts/validate-exports.ts

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with Coverage
        run: pnpm test:unit -- --coverage

      - name: Test E2E
        run: pnpm test:e2e
