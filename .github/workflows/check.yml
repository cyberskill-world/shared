---
name: 🧪 CI - Check
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  check:
    name: 🧪 Check (Node ${{ matrix.NODE_VERSION }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: contains(github.event.head_commit.message, 'from cyberskill-world/release') == false
    strategy:
      fail-fast: false
      matrix:
        NODE_VERSION: [24.14.0]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Env & Deps
        # keep @main, do not change
        uses: cyberskill-world/.github/actions/env-deps@dce044cbb91f1568eb59b782151b4e099b310249 # main
        with:
          NODE_VERSION: ${{ matrix.NODE_VERSION }}

      - name: Build Cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            dist
            node_modules/.cache
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Security Audit
        run: pnpm audit --audit-level=moderate

      - name: License Compliance
        run: pnpm exec license-checker --summary --failOn "GPL;AGPL;LGPL;SSPL"

      - name: Lint
        # keep @main, do not change
        uses: cyberskill-world/.github/actions/lint@dce044cbb91f1568eb59b782151b4e099b310249 # main

      - name: Build
        run: pnpm build

      - name: Validate Exports
        run: npx tsx scripts/validate-exports.ts

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with Coverage
        run: pnpm test:unit -- --coverage

      - name: Test E2E
        run: pnpm test:e2e
